id: "storage/digitalocean-spaces-old-bucket-limits-vs-upgraded-limits-2026"
title: "DigitalOcean Spaces Pre-July 2021 Limits vs Upgraded Limits in 2026"
problem: "Decide whether older DigitalOcean Spaces buckets should stay on legacy
  limits, be upgraded in place, or be replaced with new buckets when teams are
  hitting request-rate, object-count, or transfer constraints."
context:
  - "digitalocean"
  - "object-storage"
  - "s3-compatible-storage"
constraints:
  - "cost-sensitive"
  - "small-team"
  - "high-scale"
  - "low-ops"
candidates:
  - name: "Keep the pre-July 2021 bucket on legacy limits"
    summary: "As of 2026-03-19, DigitalOcean still documents that buckets created
      before July 2021 can remain on older, lower limits. The official limits
      page says these older buckets use 500 total operations per second, 300
      combined write/list operations per second, 10 concurrent PUT or COPY
      requests to any individual object, and 1,500 requests per IP address per
      second across all buckets on an account. DigitalOcean's current pricing is
      still a shared Spaces subscription starting at $5.00 per month for 250 GiB
      of storage and 1,024 GiB outbound transfer across all buckets, so staying
      on legacy limits does not reduce the base price. This option is
      operationally simplest, but it preserves the main bottleneck."
    when_to_use: "Use this only when the workload is stable, comfortably below the
      documented legacy request limits, and the team wants zero migration or
      support overhead. The decisive factor is that there is no pricing discount
      for keeping legacy behavior, so this is mainly justified by low
      operational risk rather than cost."
    tradeoffs: "No migration work and no application changes, but you keep the lower
      performance envelope and may continue to see throttling or scaling
      headroom issues."
    cautions: "DigitalOcean does not publish a separate legacy object-count figure
      on the current limits page; if object-count ceilings are the blocker,
      check official docs and support before assuming the bucket can scale.
      Large buckets may also not display all objects in the control panel, and
      legacy rate limits can still trigger 503 Slow Down responses."
    links:
      - "https://docs.digitalocean.com/products/spaces/details/limits/"
      - "https://docs.digitalocean.com/products/spaces/details/pricing/"
  - name: "Request an upgrade for the existing pre-July 2021 bucket"
    summary: "As of 2026-03-19, DigitalOcean explicitly states that buckets created
      before July 2021 can request an upgrade to the higher limits. The higher
      documented bucket limits are 800 total operations per second, and buckets
      created on or after July 2021 support up to 100 million unversioned
      objects or 50 million versioned objects. The pricing page does not list
      any extra fee for higher limits; Spaces Standard Storage remains $5.00 per
      month including 250 GiB storage and 1,024 GiB outbound transfer, with
      overages at $0.02 per GiB-month storage and $0.01 per GiB outbound
      transfer. This is usually the best first move when the bucket itself is
      the constraint and you want to avoid a full migration."
    when_to_use: "Use this when the bucket is old enough to be on legacy limits and
      the team is hitting rate or object-count pressure, but wants to preserve
      the existing bucket name, URLs, and integrations if possible. The decisive
      factor is that DigitalOcean offers an in-place support path to newer
      limits without publishing a separate upgrade surcharge."
    tradeoffs: "Potentially the least disruptive path to more headroom, but it
      depends on support workflow and may not be immediate or self-service."
    cautions: "The current docs say to request the upgrade through support, so
      timing and exact scope should be confirmed before promising relief in a
      rollout plan. Applications should still retry with exponential backoff on
      503 Slow Down responses, because even upgraded buckets have finite
      per-bucket limits."
    links:
      - "https://docs.digitalocean.com/products/spaces/details/limits/"
      - "https://docs.digitalocean.com/products/spaces/details/pricing/"
      - "https://cloudsupport.digitalocean.com/"
  - name: "Create a new bucket and migrate data and traffic"
    summary: "As of 2026-03-19, every new bucket is created on the current limit
      model, and DigitalOcean documents that buckets created on or after July
      2021 support up to 100 million unversioned objects or 50 million versioned
      objects. New buckets also get the current documented 800 total operations
      per second bucket limit. Pricing is the same shared subscription model, so
      creating another bucket does not create a separate base plan so long as it
      stays within the single Spaces subscription boundaries. This is the
      cleanest option when support upgrade turnaround is uncertain or when you
      want to redesign bucket layout to spread load across multiple buckets."
    when_to_use: "Use this when you need predictable access to current limits now,
      or when the workload should be sharded across multiple buckets for
      performance consistency. The decisive factor is that DigitalOcean says
      buckets cannot be transferred directly between regions or teams, so
      migration is effectively a copy-and-cutover exercise."
    tradeoffs: "Gives you a clean start on the newer limit model and can improve
      scalability by distributing workloads, but requires migration planning,
      data copy time, and endpoint cutover."
    cautions: "DigitalOcean says you cannot transfer Spaces buckets directly between
      regions or teams; you must create a new bucket and move data with a tool
      such as Rclone or another S3-compatible client. If clients depend on the
      old bucket hostname or CDN endpoint, plan for application and DNS or URL
      updates."
    links:
      - "https://docs.digitalocean.com/products/spaces/details/limits/"
      - "https://docs.digitalocean.com/products/spaces/how-to/migrate/"
      - "https://docs.digitalocean.com/products/spaces/details/pricing/"

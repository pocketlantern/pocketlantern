id: cloud/aws-cloudfront-flat-rate-plans-vs-pay-as-you-go-after-november-2025-launch
title: AWS CloudFront Flat-Rate Plans vs Pay-as-You-Go After November 2025 Launch
problem: Teams serving public web apps on AWS need a pricing decision card for
  whether the CloudFront flat-rate plans launched in November 2025 are better
  than standard per-service billing, especially because the plans bundle WAF,
  DDoS protection, logs, DNS, and edge compute.

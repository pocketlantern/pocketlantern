      name: Express 4
      version: "4"
    - type: runtime
      id: runtime/nodejs-18
      name: Node.js 18
      current_lts: "18"
      eol_date: 2025-04-30
  edges:
    - type: eol_date
      from: framework/express-4
      to: null
      date: no sooner than 2026-10-01
      successor: framework/express-5
    - type: requires_version
      from: framework/express-5
      to: runtime/nodejs-18
      min_version: "18"
      reason: Express v5.x requires Node.js 18+
    - type: breaking_change_in
      from: framework/express-5
      to: null
      change: rejected promises now flow to error middleware automatically
      migration_path: review async route handlers — unhandled rejections now reach
        error middleware instead of crashing
    - type: breaking_change_in
      from: framework/express-5
      to: null
      change: express.urlencoded() defaults extended to false; req.query uses simple
        parser instead of extended; req.body is undefined until parsed
      migration_path: "explicitly set extended: true if needed; audit query string
        parsing assumptions"
    - type: breaking_change_in
      from: framework/express-5
      to: null
      change: express.static now ignores dotfiles by default; route path matching
        syntax changed
      migration_path: run official codemods; manually audit route path patterns —
        codemods do not cover all route syntax changes
    - type: breaking_change_in
      from: framework/express-5
      to: null
      change: app.listen() now passes server errors to the callback
      migration_path: add error handling to app.listen callback

id: "backend/express-5-default-on-npm-after-v5-1-release-2025"
title: "Express 5 Default on npm After v5.1 Release 2025"
problem: "Node backend teams still assuming npm installs Express 4 need a
  change-awareness card for the March 2025 switch that made Express 5 the
  default on npm, including upgrade pain points, codemod availability, and
  support-window implications."
context:
  - "backend"
  - "nodejs"
  - "express"
  - "express-5"
  - "npm"
  - "migration"
  - "version-support"
  - "api-server"

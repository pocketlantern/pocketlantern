id: backend/zero-downtime-deployment
title: Zero-Downtime Deployment Playbook
problem: Deploying application updates without interrupting live traffic
context:
  - backend
  - deployment
  - production
constraints:
  - high-scale
  - enterprise
  - real-time
candidates:
  - name: Rolling Deployment
    summary: Replace instances one by one. New version gradually takes over while
      old instances still serve traffic.
    when_to_use: Standard web applications, Kubernetes default strategy. Best fit
      for low-ops + small-team or microservices + enterprise where simplicity
      and native orchestrator support are priorities.
    tradeoffs: Simple and well-supported. During rollout, both old and new versions
      coexist — API/schema must be backward compatible.
    cautions: Database migrations must be backward compatible. Use readiness probes
      to avoid routing to unready instances.
    links:
      - https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
  - name: Blue-Green Deployment
    summary: Run two identical environments (blue=current, green=new). Switch
      traffic all at once after green is verified.
    when_to_use: When you need instant rollback and can afford double infrastructure
      during deploy. Best fit for enterprise + compliance or real-time +
      high-scale where guaranteed rollback and zero-gap cutover are required.
    tradeoffs: Clean cutover, instant rollback by switching back. Requires 2x
      infrastructure during deployment. Database must handle both versions.
    cautions: Long-running requests on blue may be dropped at switchover. Use
      connection draining.
    links:
      - https://docs.aws.amazon.com/whitepapers/latest/overview-deployment-options/bluegreen-deployments.html
  - name: Canary Deployment
    summary: Route a small percentage of traffic to the new version first. Gradually
      increase if metrics are healthy.
    when_to_use: High-traffic services where you want to detect issues before full
      rollout. Best fit for high-scale + microservices or enterprise + real-time
      where progressive rollout reduces blast radius.
    tradeoffs: Minimizes blast radius of bad deploys. Requires traffic splitting
      infrastructure and good observability to detect issues.
    cautions: Define clear rollback criteria (error rate, latency). Ensure canary
      gets representative traffic, not just internal.
    links:
      - https://martinfowler.com/bliki/CanaryRelease.html

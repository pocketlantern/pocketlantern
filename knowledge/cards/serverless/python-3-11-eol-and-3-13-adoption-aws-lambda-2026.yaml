id: "serverless/python-3-11-eol-and-3-13-adoption-aws-lambda-2026"
title: "Python 3.11 EOL and Python 3.13 Adoption on AWS Lambda and Serverless 2026"
problem: "Python 3.11 on AWS Lambda runs on Amazon Linux 2, which reaches end of
  life on June 30, 2026. AWS recommends migrating to Amazon Linux 2023-based
  runtimes (Python 3.12, 3.13, or 3.14) before that date. Teams must choose a
  target Python version, understand AL2-to-AL2023 OS-level breaking changes, and
  verify third-party dependency compatibility — especially for Python 3.13 where
  19 standard library modules were removed in PEP 594."
context:
  - "aws-lambda"
  - "gcp-cloud-run-functions"
  - "serverless"
  - "python"
  - "amazon-linux-2"
  - "amazon-linux-2023"
  - "runtime-migration"
  - "dependency-compatibility"

id: infra/vercel-vs-netlify-vs-cloudflare-pages-2026
title: "Vercel vs Netlify vs Cloudflare Pages: Frontend Hosting Platforms (2026)"
problem: Choosing a frontend hosting and deployment platform for a B2B SaaS
  product, considering pricing models, bandwidth costs, and serverless function
  limits.
context:
  - hosting
  - deployment
  - frontend
  - serverless
  - saas
constraints:
  - serverless
  - cost-sensitive
  - small-team
  - low-ops
candidates:
  - name: Vercel
    summary: Next.js-native hosting platform. Pro plan $20/seat/month with
      credit-based billing since September 2025 restructuring. 1 TB Fast Data
      Transfer included.
    when_to_use: When you're building with Next.js and want the tightest framework
      integration (ISR, RSC, Server Actions). Best for small-team + serverless
      where developer velocity matters most.
    tradeoffs: Best DX for Next.js but most expensive at scale. Credit-based model
      since Sep 2025 makes costs more predictable but overage at $0.15/GB beyond
      1 TB adds up fast — 1.5 TB monthly traffic means $75 overage.
    cautions: "Pro plan: $20/seat/month, 1 TB bandwidth, 10M edge requests, $20
      monthly credits for overages. Hobby plan not for commercial use.
      Enterprise pricing is opaque — get quotes early."
    links:
      - https://vercel.com/pricing
      - https://vercel.com/docs/pricing
  - name: Netlify
    summary: JAMstack pioneer with credit-based pricing since September 2025. Pro
      plan $19/member/month with 1 TB bandwidth and 25K build minutes.
    when_to_use: When you want framework-agnostic hosting with strong build pipeline
      and form/identity add-ons. Best for teams using Astro, SvelteKit, or other
      non-Next.js frameworks.
    tradeoffs: More framework-agnostic than Vercel but Next.js support lags.
      Generous build minutes (25K vs Vercel's credit-based). Per-seat pricing
      adds up for larger teams.
    cautions: "Pro: $19/member/month, 1 TB bandwidth, 25K build minutes, 3
      concurrent builds. Free plan: 100 GB bandwidth, 300 build minutes. Legacy
      plans being phased out — new accounts get credit-based plans."
    links:
      - https://www.netlify.com/pricing/
      - https://docs.netlify.com/manage/accounts-and-billing/billing/billing-for-credit-based-plans/
  - name: Cloudflare Pages
    summary: Static site and full-stack hosting on Cloudflare's edge network. Free
      tier with unlimited bandwidth and 500 builds/month. Functions billed as
      Workers requests.
    when_to_use: When bandwidth cost is critical — CF Pages has unlimited free
      bandwidth vs $0.15/GB on Vercel. Best for cost-sensitive deployments or
      high-traffic marketing sites alongside your SaaS.
    tradeoffs: Unlimited free bandwidth is unmatched, but DX for full-stack apps is
      rougher than Vercel/Netlify. Functions run as Workers ($5/month paid plan
      for 10M requests). No built-in preview comments or analytics.
    cautions: "Free: unlimited bandwidth, 500 builds/month, 100K Workers
      requests/day. Paid Workers: $5/month for 10M requests. Durable Objects
      storage billing enabled Jan 2026. Pages Functions = Workers under the
      hood."
    links:
      - https://developers.cloudflare.com/pages/functions/pricing/
      - https://developers.cloudflare.com/workers/platform/pricing/

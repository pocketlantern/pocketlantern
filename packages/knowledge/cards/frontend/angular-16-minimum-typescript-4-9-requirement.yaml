id: frontend/angular-16-minimum-typescript-4-9-requirement
title: Angular 16+ Requires TypeScript 4.9 Minimum — Version Floor
problem: "As of 2026-03-18, Angular enforces a strict TypeScript version floor
  and ceiling for each major release: Angular 16 required TypeScript >=4.9.3,
  Angular 17 required >=5.2.0, Angular 18 required >=5.4.0, Angular 19 (LTS
  until 2026-05-19) requires >=5.5.0, Angular 20 (LTS until 2026-11-28) requires
  >=5.8.0, and Angular 21 (Active, LTS until 2027-05-19) requires >=5.9.0.
  Angular versions 16 through 18 are fully EOL and unsupported. Teams on
  outdated TypeScript cannot upgrade Angular without satisfying each version's
  floor, and TypeScript versions above the ceiling will also break the build."

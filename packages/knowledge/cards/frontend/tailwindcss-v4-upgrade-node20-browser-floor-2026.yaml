id: "frontend/tailwindcss-v4-upgrade-node20-browser-floor-2026"
title: "Tailwind CSS v4 Upgrade With Node 20 Requirement and Modern Browser Floor"
problem: "Decide whether to upgrade now or stay on v3.4 when Tailwind v4 moves
  config into CSS, splits CLI/PostCSS packages, requires Node 20+, and drops
  older browser support."
context:
  - "frontend"
  - "tailwindcss"
  - "css"
  - "postcss"
  - "vite"
constraints:
  - "small-team"
  - "monorepo"
candidates:
  - name: "Upgrade to Tailwind CSS v4 now"
    summary: "As of 2026-03-19, Tailwind CSS v4's official upgrade guide says the
      upgrade tool requires Node.js 20 or higher. The guide also says migration
      typically updates dependencies, migrates configuration into CSS, and
      adjusts template files. Tailwind v4 splits packaging so the PostCSS plugin
      is now `@tailwindcss/postcss`, the CLI is now `@tailwindcss/cli`, and Vite
      users are steered to `@tailwindcss/vite`. Browser support is now a modern
      floor: Safari 16.4+, Chrome 111+, and Firefox 128."
    when_to_use: "Use this when your runtime and CI are already on Node 20+ and your
      supported browsers are at or above Tailwind's new floor. It is the better
      choice when you want to align with the current Tailwind architecture and
      can absorb CSS-import, package, and config migration work now."
    tradeoffs: "You get onto the current major version and official migration path,
      but you must update build tooling, review breaking utility changes, and
      retest browser support. Teams using older browser targets or older Node
      baselines will take on real rollout risk."
    cautions: "JavaScript config files are still supported only for backward
      compatibility and are no longer auto-detected; v4 requires explicit
      `@config` if you keep one, and `corePlugins`, `safelist`, and `separator`
      from JS config are not supported in v4.0. Tailwind v4 is also not designed
      for Sass, Less, or Stylus."
    links:
      - "https://tailwindcss.com/docs/upgrade-guide"
      - "https://tailwindcss.com/docs/installation/using-postcss"
      - "https://tailwindcss.com/docs/installation/tailwind-cli"
      - "https://tailwindcss.com/docs/compatibility"
  - name: "Stay on Tailwind CSS v3.4 for now"
    summary: "As of 2026-03-19, Tailwind's own upgrade guide explicitly recommends
      sticking with v3.4 if you need to support browsers older than Safari 16.4,
      Chrome 111, or Firefox 128. Staying on v3.4 also avoids the Node 20+
      requirement of the official upgrade tool and avoids immediate migration to
      CSS-based configuration and new package names. This is the lowest-risk
      option if your stack still depends on older browser coverage or on
      established v3 PostCSS and CLI wiring."
    when_to_use: "Use this when browser compatibility or Node upgrade timing is the
      real blocker, not Tailwind feature demand. It is the better short-term
      choice when your team needs stability and cannot yet standardize on the v4
      toolchain assumptions."
    tradeoffs: "You preserve compatibility and avoid migration churn, but you defer
      the inevitable major-version transition and remain on the older package
      and configuration model. Future framework or tooling upgrades may become
      harder if the rest of the stack moves ahead first."
    cautions: "This is a deferral strategy, not a long-term simplification. Check
      official docs before planning around any future compatibility mode because
      Tailwind only says it is being explored, not that it is available."
    links:
      - "https://tailwindcss.com/docs/upgrade-guide"
      - "https://v3.tailwindcss.com/docs/installation"

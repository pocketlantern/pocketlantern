candidates:
  - name: "PocketBase"
    summary: "Single Go binary (MIT license, v0.36.6 as of March 2026) bundling SQLite in WAL mode, auth (email/password + 15+ OAuth2 providers), file storage (local or S3), realtime subscriptions, and an admin dashboard — all deployed as one executable with zero external dependencies. Runs on any VPS; deploy by copying a single file. Pre-v1.0: full backward compatibility is not yet guaranteed."
    when_to_use: "Best for low-ops + small-team projects where operational simplicity outweighs horizontal scalability — a $5/month VPS running a single binary with no container orchestration is the entire stack. The single decisive factor is vertical-only scale: if your app could outgrow one server or requires HA and zero-downtime deployments, PocketBase is not the right fit. Ideal for SaaS MVPs, mobile API backends, intranets, and internal tools."
    tradeoffs: "Lowest possible operational surface area — no Docker, no orchestration, no external services required. SQLite WAL mode can handle 10,000+ persistent realtime connections on modest hardware per the official FAQ. Custom logic added via Go or JavaScript hooks without a separate functions runtime. Trade-off: SQLite only (no plans to support Postgres or other databases), single-server vertical scaling only with no native HA or multi-node support, and no managed hosting option — you always own the infrastructure. Auth, storage, and realtime are tightly coupled to SQLite, meaning no swap-out to external services."
    cautions: "The official docs explicitly state PocketBase is not recommended for production-critical applications before v1.0.0, and backward compatibility is not guaranteed across versions — factor upgrade effort into adoption decisions. The project is volunteer-driven with no paid support team and no SLA promises beyond what the open-source community provides. SQLite is not suitable for write-heavy workloads requiring concurrent high-volume transactions; if you expect this pattern, evaluate before committing."
    links:
      - "https://pocketbase.io/"
      - "https://pocketbase.io/faq/"
      - "https://pocketbase.io/docs/going-to-production/"
      - "https://github.com/pocketbase/pocketbase"
  - name: "Supabase Self-Hosted"
    summary: "Self-hosted Supabase deploys approximately ten open-source Docker services — Studio (dashboard), Kong (API gateway), GoTrue (JWT auth), PostgREST (REST API), Realtime (WebSocket), Storage, Deno (Edge Functions), postgres-meta, Supavisor (connection pooling), and Vector/Logflare (observability) — on your own infrastructure, backed by Postgres. Components are MIT- or Apache 2-licensed. Community-supported via GitHub Discussions, Discord, and Reddit; no official SLA."
    when_to_use: "Best for low-ops + compliance environments where you need Supabase's full Postgres-based BaaS feature set but data residency, cost at scale, or regulatory requirements prevent using the managed cloud. Choose self-hosted over PocketBase when your workload requires Postgres semantics, horizontal read scaling via read replicas, or the PostgREST + RLS combination. Requires Linux admin and Docker Compose proficiency — this is not a zero-ops path."
    tradeoffs: "Brings the full Supabase Postgres ecosystem (RLS, pgvector, PostgREST, Realtime, GoTrue) under your control at infrastructure cost only. No per-seat or per-MAU billing. Freely extensible Postgres means community extensions are available without vendor gating. Trade-off: 10+ running services require meaningful devops effort for provisioning, TLS, backups, and monitoring. Minimum verified hardware: 4 GB RAM, 2 CPU cores, 50 GB SSD (8 GB RAM / 4 cores recommended for production). Several Studio features that work in cloud are missing or broken in self-hosted, including log drains, branching, and some auth provider config screens."
    cautions: "Self-hosted Supabase Studio v2025.12.23 was reported to crash on Project Settings pages for deployments missing the _supabase.log_drains table — a known gap between cloud and self-hosted feature sets. Branching and log drain forwarding (to Datadog, Grafana Loki, etc.) are cloud-only features with no self-hosted equivalent as of 2026-03-16. Community support means issue resolution timelines are unpredictable; enterprises requiring guaranteed response should evaluate the managed Enterprise plan."
    links:
      - "https://supabase.com/docs/guides/self-hosting"
      - "https://supabase.com/docs/guides/self-hosting/docker"
      - "https://supabase.com/docs/guides/getting-started/architecture"
  - name: "Supabase Cloud (Managed)"
    summary: "Fully managed Supabase on Supabase-operated infrastructure. As of 2026-03-16: Free ($0, 2 projects, 500 MB DB, 50K MAU, pauses after 7 days of inactivity); Pro ($25/month base, 8 GB DB, 100K MAU, includes $10 compute credit — real production cost typically $125/month with a Large compute add-on); Team ($599/month, SOC2 reports, SSO, priority support); Enterprise (custom pricing, 99.9% SLA, BYO cloud). Official support; full feature set including log drains and branching."
    when_to_use: "Best for small-team + low-ops stacks where eliminating all infrastructure operations justifies the per-plan cost. Choose managed over self-hosted when you want official support, access to cloud-only features (branching, log drains), and predictable monthly billing without managing a ten-service Docker stack. The decisive factor: Team at $599/month is required for SOC2 compliance reports, making self-hosted the only path for compliance-sensitive workloads below that budget."
    tradeoffs: "Zero operational overhead — Supabase manages provisioning, TLS, backups, upgrades, and monitoring. Full access to all features including database branching, log drain forwarding, and read replicas. Pro spend cap protects against most overage surprises. Trade-off: spend cap explicitly does not cover compute add-ons, PITR, IPv4 addresses, read replicas, or log drains — these are billed regardless of cap setting. Free tier project pause after 7 days of inactivity makes it unsuitable for always-on free deployments. Vendor lock-in is moderate: data is standard Postgres, but the managed auth, storage, and realtime layers have migration cost."
    cautions: "Pro at $25/month includes only a Micro compute instance — production applications typically require at least the Large compute add-on, bringing real cost to approximately $125/month. Overages on MAU ($3.25 per 1,000 users beyond quota) and egress ($0.09/GB) are not covered by the spend cap. Team at $599/month is required for SOC2 Type II compliance reports; this is a hard gate for enterprise procurement. Verify current plan limits, overage rates, and compute add-on pricing directly at supabase.com/pricing before committing."
    links:
      - "https://supabase.com/pricing"
      - "https://supabase.com/docs/guides/platform/billing-on-supabase"
      - "https://supabase.com/alternatives/supabase-vs-firebase"

id: "backend/graphql-subscriptions-infrastructure-cost-2026"
title: "GraphQL Subscriptions Cost—Apollo vs Hasura vs Custom Infrastructure 2026"
problem: "Real-time applications using GraphQL subscriptions must choose between
  Apollo GraphOS with a self-hosted router (cloud routing fully discontinued as
  of March 2026), Hasura DDN's model-based managed platform (subscriptions in
  beta), or custom self-hosted infrastructure using graphql-ws and Redis
  Pub/Sub. Concurrency and cost scale non-linearly across all three approaches
  and the optimal choice depends on federation complexity, schema shape, and
  event volume."
context:
  - "graphql"
  - "real-time"
  - "subscriptions"
  - "websocket"
  - "backend"
  - "apollo"
  - "hasura"
  - "federation"

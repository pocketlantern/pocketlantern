id: observability/opentelemetry-vendor-pipeline
title: OpenTelemetry Pipeline vs Vendor-Native SDKs
problem: Choose between a vendor-neutral OpenTelemetry pipeline and
  vendor-native instrumentation given current SDK maturity, sampling controls,
  trace-log correlation, egress cost, and migration risk.
context:
  - observability
  - tracing
  - logging
  - telemetry
  - distributed-systems
constraints:
  - high-scale
  - low-ops
  - cost-sensitive
  - enterprise
  - microservices
  - compliance
candidates:
  - name: Upstream OpenTelemetry SDKs + Collector + OTLP
    summary: Use upstream OpenTelemetry APIs/SDKs in services and route telemetry
      through an OpenTelemetry Collector over OTLP. This is the strongest
      portability option when migration risk matters, but as of 2026-03-14 the
      maturity is still uneven by language and Collector components still have
      mixed stability.
    when_to_use: Best for enterprise + microservices + compliance where you want
      vendor-neutral instrumentation, policy control before data leaves your
      network, and the option to change backends later with minimal app-code
      rewrite. Also a strong fit for high-scale + cost-sensitive teams that want
      collector-side batching, filtering, redaction, and tail/probabilistic
      sampling before vendor billing starts.
    tradeoffs: Lowest lock-in and best long-term migration posture. The Collector
      gives you retries, batching, encryption, filtering, and sophisticated
      sampling, but you now own pipeline design, scaling, and language-specific
      gaps such as OpenTelemetry logs being stable in .NET, beta in Go, and
      still in development in JavaScript.
    cautions: "Do not treat all OTel components as equally mature: the Collector is
      explicitly mixed-status, the tail-sampling processor is still beta, and
      experimental semantic conventions can still introduce breaking changes
      even when a language SDK is otherwise stable. If trace-log correlation is
      a must-have, verify Logs support for each runtime before standardizing."
    links:
      - https://opentelemetry.io/docs/collector/
      - https://opentelemetry.io/docs/collector/components/processor/
      - https://opentelemetry.io/docs/concepts/sampling/
      - https://opentelemetry.io/docs/languages/
      - https://opentelemetry.io/docs/languages/dotnet/
      - https://opentelemetry.io/docs/languages/go/
      - https://opentelemetry.io/docs/languages/js/
      - https://opentelemetry.io/docs/migration/
  - name: Vendor-Native SDKs or APM Agents
    summary: Use the observability vendor's own SDKs or agents end to end for
      instrumentation, ingest, correlation, and sampling. This is usually the
      fastest route to mature auto-instrumentation and polished trace-log
      workflows; pricing and policy tradeoffs must be modeled explicitly as of
      2026-03-14.
    when_to_use: Best for low-ops + small-team or enterprise + real-time
      environments where one vendor is already the platform standard and faster
      rollout matters more than portability. Choose this when you want
      backend-aware sampling and turnkey correlation more than you want backend
      optionality; for example, Datadog exposes granular ingestion rules and
      automatic trace/log correlation, while New Relic offers adaptive and
      tail-based options tied to its platform.
    tradeoffs: "Best operator experience and usually the strongest out-of-the-box
      correlation, dashboards, and support. Highest lock-in: later migration
      often means redoing instrumentation choices, vendor tags, sampling rules,
      alerts, and data-shaping assumptions."
    cautions: Budgeting can dominate the decision. As of 2026-03-14, Datadog's
      pricing page lists Observability Pipelines at $0.095-$0.12/GB ingested,
      APM at $31-$36 per host/month, APM ingestion at $0.10/GB, indexed spans
      from $1.27 per 1M spans, and log forwarding to custom destinations at
      $0.25/GB outbound; New Relic's usage plan lists Data at $0.40/GB, Data
      Plus at $0.60/GB, and an EU data-center add-on at $0.05/GB. Also verify
      where sampling happens, because in-agent, collector, and backend sampling
      can interact in surprising ways.
    links:
      - https://www.datadoghq.com/pricing/list/
      - https://docs.datadoghq.com/tracing/trace_collection/library_config/
      - https://docs.datadoghq.com/tracing/other_telemetry/connect_logs_and_traces/
      - https://docs.newrelic.com/docs/licenses/license-information/usage-plans/new-relic-usage-plan/
      - https://docs.newrelic.com/docs/distributed-tracing/concepts/how-new-relic-distributed-tracing-works/
  - name: "Hybrid: OpenTelemetry APIs with Vendor Bridge or Vendor OTel Distribution"
    summary: Instrument to OpenTelemetry APIs or OTLP, but run through a
      vendor-supported bridge or distribution for the current backend. This is
      the practical middle path when you want lower migration risk than pure
      vendor-native SDKs without giving up the rollout tooling and
      backend-specific features a vendor can provide; as of 2026-03-14 Datadog
      recommends DDOT Collector for Datadog backends, and New Relic ships
      OpenTelemetry API support in major agents.
    when_to_use: "Best for enterprise + microservices or monorepo + small-team
      environments doing a staged migration: keep app code close to OTel
      conventions, but rely on the vendor for support, packaging, and some
      backend-specific optimizations. It is especially useful when you expect a
      possible backend change later but cannot afford a full upstream-OTel
      rollout right now."
    tradeoffs: "More portable than fully native vendor SDKs and easier to adopt than
      a pure upstream OTel platform. Still not fully neutral: the deployment
      path, compatibility matrix, and some advanced capabilities remain
      vendor-shaped."
    cautions: Read the language-specific limitations closely. New Relic's
      OpenTelemetry API support is disabled by default, requires minimum agent
      versions, supports trace-ratio alignment in mixed environments, and in
      Node.js does not automatically enable OpenTelemetry instrumentations.
      Datadog's DDOT approach keeps OpenTelemetry pipelines but still pulls you
      toward Datadog agent features and Datadog-specific operational patterns.
    links:
      - https://docs.datadoghq.com/opentelemetry/setup/
      - https://docs.newrelic.com/docs/apm/agents/manage-apm-agents/opentelemetry-api-support/
      - https://docs.newrelic.com/docs/distributed-tracing/concepts/how-new-relic-distributed-tracing-works/

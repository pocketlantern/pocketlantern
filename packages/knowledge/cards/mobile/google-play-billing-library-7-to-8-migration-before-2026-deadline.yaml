id: mobile/google-play-billing-library-7-to-8-migration-before-2026-deadline
title: Google Play Billing Library 7 to 8 Migration Before 2026 Enforcement
problem: Decide whether to stop at Billing Library 7 or move directly to 8
  before the August 31, 2026 release deadline, accounting for API signature
  changes, new product model behavior, and extension-request timing.
context:
  - mobile
  - android
  - google-play
  - play-billing
  - in-app-purchases
  - subscriptions
  - one-time-products
  - billingclient
  - play-console
  - release-planning
  - migration
constraints:
  - small-team
  - enterprise
  - compliance
  - low-ops
  - monorepo
candidates:
  - name: Move directly to Google Play Billing Library 8 now
    summary: Default path as of 2026-03-15 when you can absorb one billing migration
      instead of two. Google's deprecation FAQ says Billing Library 7 can be
      used for new releases only until August 31, 2026, while Billing Library 8
      is supported until August 31, 2027, and the release notes show 8.0.0 added
      multiple purchase options and offers for one-time products, changed
      `ProductDetailsResponseListener.onProductDetailsResponse()` to return
      `QueryProductDetailsResult`, added automatic service reconnection, and
      added launch sub-response codes.
    when_to_use: Best for small-team + low-ops or enterprise + compliance teams
      where billing code is actively maintained, release trains are predictable,
      and you want to clear the 2026 policy deadline early. Choose this when you
      can update `queryProductDetailsAsync()` callers, handle `UnfetchedProduct`
      results, and adapt UI or server assumptions to one-time-product offer
      lists instead of freezing on 7 and revisiting the same area again later,
      as of 2026-03-15.
    tradeoffs: You get the longest runway before the next deprecation cycle and pick
      up the newer billing behavior in one step, but you must change callback
      signatures, remove deprecated APIs that PBL 8 no longer supports, and test
      offer-selection logic more carefully.
    cautions: Google says PBL 8 removes `querySkuDetailsAsync()`, the no-arg
      `enablePendingPurchases()`, `queryPurchaseHistoryAsync()`, and the
      `queryPurchasesAsync(String skuType, ...)` overload. Google also says
      `queryProductDetailsAsync()` now returns eligible offers plus
      `UnfetchedProduct` failures, that one-time products return only
      user-eligible offers, and that caching `ProductDetails` objects is not
      recommended because stale objects can cause `launchBillingFlow()`
      failures. Rarely, some devices still cannot support `ProductDetails`, and
      Google's integration guide points to the Play Billing Library 7
      backward-compatibility path for that case.
    links:
      - https://developer.android.com/google/play/billing/deprecation-faq
      - https://developer.android.com/google/play/billing/migrate-gpblv8
      - https://developer.android.com/google/play/billing/release-notes
      - https://developer.android.com/google/play/billing/integrate
  - name: Stay on Google Play Billing Library 7.1.1 for near-term releases, but
      time-box the 8 migration before August 31, 2026
    summary: Conservative short-term path as of 2026-03-15 if the app is already on
      Billing Library 7 and the immediate goal is release stability. Google's
      release notes show 7.1.1 is the latest 7.x bug-fix release, and the PBL 7
      migration guide says all new PBL 7 APIs are optional and developers do not
      need to implement API changes just to update to 7.
    when_to_use: Best for enterprise + monorepo or small-team + compliance teams
      where current revenue releases would be put at risk by the PBL 8 callback
      and product-model changes, but you can commit to a scheduled PBL 8 project
      well before late August 2026. Use this only when you need to preserve
      current behavior around `ProductDetails` handling, pending-purchase setup,
      or billing test coverage for one more release cycle, as of 2026-03-15.
    tradeoffs: This minimizes short-term churn because PBL 7 can be a lighter stop
      if you are already compatible, but it deliberately burns policy runway and
      guarantees a second migration before the 2026 release cutoff.
    cautions: Google's deprecation FAQ says Billing Library 7 can be used for new
      apps or updates only until August 31, 2026, with extension requests only
      up to November 1, 2026. That means stopping at 7 is not a durable answer
      for actively maintained apps. PBL 7 also leaves you without PBL 8's
      automatic reconnection and new `QueryProductDetailsResult` behavior, so
      teams that postpone need a fixed owner and date for the 8 migration rather
      than an open-ended backlog item.
    links:
      - https://developer.android.com/google/play/billing/deprecation-faq
      - https://developer.android.com/google/play/billing/migrate-gpblv7
      - https://developer.android.com/google/play/billing/release-notes
  - name: Use the Play Console extension only as a contingency if the 8 migration is
      blocked late in 2026
    summary: Fallback policy path as of 2026-03-15, not the default engineering
      plan. Google's deprecation FAQ says Billing Library 7 release use ends on
      August 31, 2026, and that an extension request can be made up to November
      1, 2026 through the warning details page or Policy status issue in Play
      Console.
    when_to_use: Best for enterprise + compliance teams where a specific blocker
      such as an SDK dependency, certification cycle, or revenue-critical freeze
      prevents shipping PBL 8 before August 31, 2026, and you need temporary
      distribution time rather than a permanent technical choice. This fits
      teams that already have a concrete 8 migration branch and only need a
      short policy bridge.
    tradeoffs: This can buy time for a blocked release train, but it keeps the app
      on a deprecated billing dependency and adds operational uncertainty
      because the extension flow is tied to Play Console warnings rather than a
      normal release workflow.
    cautions: Do not treat the extension window as extra planning runway by default.
      Google's public doc only says where the form appears and the last date it
      can be requested; it does not remove the need to migrate. Existing apps on
      deprecated billing versions may continue to function, but Google says the
      deprecation blocks new apps and updates from using older versions.
    links:
      - https://developer.android.com/google/play/billing/deprecation-faq
      - https://developer.android.com/google/play/billing/migrate-gpblv8

id: mobile/firebase-apple-sdk-swift-6-toolchain-xcode-16-2-requirement-2025
title: Firebase Apple SDK Swift 6 Toolchain and Xcode 16.2 Requirement in 2025-2026
problem: iOS teams using Firebase need to know which Firebase Apple SDK versions
  require the Swift 6.0 toolchain and Xcode 16.2+, and decide whether to adopt
  Firebase 12.x immediately, pin to Firebase 11.x as a short-term hold, or stage
  the Swift 6 language mode migration separately from the toolchain upgrade. The
  answer drives CI image selection, CocoaPods/SPM dependency pins, App Store
  submission readiness, and whether iOS 13/14 minimum deployment targets can be
  preserved.
context:
  - mobile
  - ios
  - firebase
  - swift

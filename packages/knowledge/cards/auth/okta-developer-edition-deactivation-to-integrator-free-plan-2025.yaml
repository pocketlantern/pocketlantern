id: "auth/okta-developer-edition-deactivation-to-integrator-free-plan-2025"
title: "Okta Developer Edition Deactivation to Integrator Free Plan 2025"
problem: "Teams using old Okta Developer Edition orgs need to know the
  deactivation dates, inactive-org limitations, and migration path to Integrator
  Free Plan so test environments, OIN submissions, and automation do not
  disappear unexpectedly."
context:
  - "auth"
  - "okta"
  - "okta-developer-edition"
  - "okta-integrator-free-plan"
  - "okta-integration-network"
  - "oin"

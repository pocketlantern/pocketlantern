id: database/postgres-major-version-upgrade
title: Postgres Major Version Upgrade Strategy
problem: Decide when to upgrade production Postgres to a newer major version
  given extension compatibility, provider support windows, replication
  constraints, query planner changes, and rollback options.
context:
  - database
  - postgresql
  - production
  - managed-services
  - replication
constraints:
  - high-scale
  - low-ops
  - cost-sensitive
  - enterprise
  - small-team
  - microservices
  - real-time
  - compliance
candidates:
  - name: In-Place `pg_upgrade` / Managed Engine Upgrade
    summary: Use the provider's direct major-version upgrade path when a maintenance
      window is acceptable and the target version passes extension and
      instance-class checks. PostgreSQL documents `pg_upgrade` as the fast path
      for major upgrades because it reuses existing data files instead of
      requiring dump/restore.
    when_to_use: When you want the fewest moving parts, your provider exposes a
      valid upgrade target, and brief downtime is acceptable. Best for low-ops +
      small-team or enterprise + compliance where replicas can move with the
      primary and rollback is based on backups or snapshots rather than a
      parallel live cutover. As of 2026-03-14, treat the PostgreSQL support
      table and your provider's valid upgrade-target list as release-gating
      checks before scheduling.
    tradeoffs: Usually simpler and faster than dump/restore, and managed platforms
      can automate much of the procedure. You still need a maintenance window,
      extension work is separate, and rollback becomes unsafe once the upgraded
      cluster has taken writes.
    cautions: PostgreSQL 18 `pg_upgrade` transfers most optimizer statistics, but
      not all, and the docs still instruct you to regenerate missing stats after
      upgrade. On Amazon RDS, major upgrades are manual, read replicas are
      upgraded with the primary, prepared transactions must be cleared, and
      unsupported extensions must be upgraded or dropped first. If targeting
      PostgreSQL 18 specifically, read the major release notes because they
      include optimizer changes and reindex guidance for some upgraded clusters.
    links:
      - https://www.postgresql.org/support/versioning/
      - https://www.postgresql.org/docs/current/pgupgrade.html
      - https://www.postgresql.org/docs/release/18.0/
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.PostgreSQL.MajorVersion.html
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.PostgreSQL.MajorVersion.Process.html
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.PostgreSQL.ExtensionUpgrades.html
  - name: Logical Replication Side-by-Side Cutover
    summary: Build a new cluster on the target major version, replicate into it,
      validate with production-like traffic, then switch applications over.
      PostgreSQL now documents upgrade steps for logical-replication clusters,
      and Amazon RDS Blue/Green uses logical replication for PostgreSQL
      major-version upgrades.
    when_to_use: When downtime must be minimized, you need a long validation window
      on a live copy, or you want to preserve the old cluster as a rollback
      option until cutover. Best for high-scale + real-time or microservices +
      enterprise where a staged switchover is worth the extra setup and
      temporary double capacity.
    tradeoffs: Gives a shorter cutover and better pre-production verification than
      an in-place upgrade. It adds more operational complexity, requires extra
      capacity, and forces you to manage replication lag, schema sync, and
      cutover choreography.
    cautions: PostgreSQL documents that logical replication does not replicate DDL,
      sequence state, or large objects, and schema drift can stop replication
      until the subscriber is updated. Current PostgreSQL docs also say
      migration of logical-replication clusters is only supported when all
      members of the old cluster are version 17.0 or later. For generic logical
      replication you must configure `wal_level=logical` and enough
      slots/workers; on RDS Blue/Green, major-version upgrades use logical
      replication and come with additional feature and extension limitations.
    links:
      - https://www.postgresql.org/docs/current/logical-replication-upgrade.html
      - https://www.postgresql.org/docs/current/logical-replication-restrictions.html
      - https://www.postgresql.org/docs/current/logical-replication-config.html
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/blue-green-deployments-replication-type.html
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/blue-green-deployments-considerations.html
  - name: Fresh Dump/Restore Into a New Cluster
    summary: Export from the old cluster and restore into a newly initialized target
      major version when you want a clean rebuild or when `pg_upgrade` and
      provider-managed paths are blocked. PostgreSQL explicitly positions
      `pg_upgrade` as avoiding the dump/restore path, which makes dump/restore
      the conservative fallback when binary reuse is not a good fit.
    when_to_use: When the dataset is small enough for a longer outage, you want to
      rebuild storage and configuration from scratch, or extension/provider
      constraints make in-place upgrade too risky. Best for cost-sensitive +
      small-team or compliance + enterprise where a deterministic export/import
      procedure is easier to audit than a complex live cutover.
    tradeoffs: Most portable and easiest to reason about because the target cluster
      is created fresh. It is usually the slowest path, produces the longest
      outage, and is the most I/O-intensive option.
    cautions: "`pg_dump` is intended to load into newer PostgreSQL versions, can
      dump from older servers, but cannot dump from a server newer than its own
      major version. The docs also say loading into an older major version is
      not guaranteed. Even with dumped statistics, PostgreSQL recommends running
      `ANALYZE` after restore for best optimizer behavior, and recreated logical
      subscriptions or sequence state need explicit verification."
    links:
      - https://www.postgresql.org/docs/18/app-pgdump.html
      - https://www.postgresql.org/docs/current/pgupgrade.html
      - https://www.postgresql.org/support/versioning/

sidecar_hard_facts:
  extracted: 2026-03-16
  nodes:
    - type: package
      id: package/postgresql-13
      name: PostgreSQL 13
      version: "13"
    - type: package
      id: package/postgresql-18
      name: PostgreSQL 18
      version: "18"
    - type: vendor
      id: vendor/cloud-sql
      name: Google Cloud SQL
      category: cloud
    - type: vendor
      id: vendor/azure-postgresql
      name: Azure PostgreSQL
      category: cloud
    - type: package
      id: package/postgis
      name: PostGIS
      version: 3.6.x
  edges:
    - type: eol_date
      from: package/postgresql-13
      to: null
      date: 2025-11-13
      successor: package/postgresql-17
    - type: breaking_change_in
      from: package/postgresql-18
      to: null
      change: postgis_topology unavailable on RDS PostgreSQL 18.1 and 18.2
      migration_path: wait for RDS 18.3+ or remove postgis_topology dependency
    - type: breaking_change_in
      from: package/postgresql-18
      to: null
      change: plrust removed starting in RDS PostgreSQL 18 — conflicting AWS docs on
        availability
      migration_path: verify plrust readiness case-by-case; remove before upgrade if uncertain
    - type: requires_version
      from: package/postgresql-18
      to: package/postgis
      min_version: 3.6.0+
      reason: Cloud SQL PG18 requires PostGIS 3.6.0+
    - type: locks_via
      from: vendor/azure-postgresql
      to: package/postgresql-13
      surface: in-place upgrades block on timescaledb, orafce, postgres_fdw; no read
        replicas or logical replication during upgrade
      severity: high
    - type: locks_via
      from: vendor/cloud-sql
      to: package/postgresql-13
      surface: pg_ivm blocks major upgrades; rdkit 4.6.1 and pg_squeeze 1.7 required
        for upgrade prep
      severity: medium

      id: vendor/vercel-edge
      name: Vercel Edge Functions
      category: edge
  edges:
    - type: breaking_change_in
      from: package/prisma-v7
      to: null
      change: ESM packaging — custom output path required for prisma-client generator
      migration_path: update schema.prisma generator config with output path
    - type: breaking_change_in
      from: package/prisma-v7
      to: null
      change: driver adapters required for direct database connectivity
      migration_path: install and configure appropriate driver adapter
    - type: breaking_change_in
      from: package/prisma-v7
      to: null
      change: MongoDB not supported on v7
      migration_path: stay on Prisma v6 for MongoDB
    - type: breaking_change_in
      from: package/drizzle
      to: null
      change: timestamp mapping changed in 0.30.0
      migration_path: review and update timestamp columns
    - type: breaking_change_in
      from: package/drizzle
      to: null
      change: PostgreSQL indexes API changed in 0.31.0
      migration_path: update index definitions
    - type: breaking_change_in
      from: package/drizzle
      to: null
      change: RQBv2 migration changes in 1.0.0-beta.2
      migration_path: review RQBv2 migration guide
    - type: requires_version
      from: package/drizzle
      to: vendor/vercel-edge
      min_version: edge-compatible driver required
      reason: standard Node.js database clients not supported on edge runtimes

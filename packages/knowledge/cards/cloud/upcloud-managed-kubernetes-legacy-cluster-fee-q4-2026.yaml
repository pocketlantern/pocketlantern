id: "cloud/upcloud-managed-kubernetes-legacy-cluster-fee-q4-2026"
title: "UpCloud Managed Kubernetes Legacy Cluster Fee Starting Q4 2026"
problem: "Teams running older UpCloud Kubernetes clusters need to decide whether
  to migrate before the legacy cluster fee lands or accept higher steady-state
  platform cost."
context:
  - "cloud"
  - "upcloud"
  - "kubernetes"
constraints:
  - "cost-sensitive"
  - "low-ops"
candidates:
  - name: "Migrate legacy UKS clusters to Kubernetes 1.30 or newer before Q4 2026"
    summary: "As of 2026-03-27, UpCloud gives full SLA coverage and regular security
      patching only for Kubernetes 1.30 through 1.34, while 1.26 through 1.29
      are marked legacy and EOL. UpCloud says remaining legacy clusters may
      incur a Legacy Infrastructure Maintenance surcharge starting in Q4 2026,
      but the official docs do not publish the surcharge amount. UpCloud also
      states that clusters on 1.30+ support automated in-place upgrades, which
      is the main architectural break from legacy clusters. Control plane
      pricing remains the standard UKS rate: Development is free for clusters up
      to 30 nodes without HA, and Production is 60 EUR per month for clusters up
      to 120 nodes with HA; worker nodes are billed separately at normal Cloud
      Server rates."
    when_to_use: "Use this when you are cost-sensitive and want to avoid an
      undefined surcharge plus the operational risk of running outside SLA and
      patch coverage. It is the default path if the cluster is still on 1.29 or
      below and you expect to keep using UKS into late 2026."
    tradeoffs: "You avoid the upcoming legacy fee and return to supported upgrades,
      but you must perform a cluster-to-cluster migration if you are on 1.29 or
      below."
    cautions: "UpCloud's migration guide says 1.29-and-below clusters require
      migration to a fresh 1.30+ cluster using Velero and Object Storage. The
      guide also warns that restores only go to higher Kubernetes versions,
      workloads must not depend on APIs removed in 1.30, and load balancer
      annotations should be stripped so UKS recreates load balancers in the
      target cluster."
    links:
      - "https://upcloud.com/docs/products/managed-kubernetes/supported-version\
        s/"
      - "https://upcloud.com/docs/guides/migration-uks-velero/"
      - "https://upcloud.com/docs/products/managed-kubernetes/billing/"
      - "https://upcloud.com/pricing/"
  - name: "Keep the legacy cluster temporarily and budget for the Q4 2026 surcharge"
    summary: "As of 2026-03-27, UpCloud still keeps Kubernetes 1.26 through 1.29
      clusters available on a best-effort basis to allow migration, but these
      versions are outside SLA and no new security patches or bug fixes will be
      released. UpCloud explicitly says a Legacy Infrastructure Maintenance
      surcharge is expected to begin for remaining legacy clusters in Q4 2026.
      The official documentation does not publish the surcharge amount, so
      budget impact must be treated as unknown until UpCloud posts pricing or
      confirms it directly. This option mainly buys time if migration cannot
      happen immediately."
    when_to_use: "Use this only when migration is blocked by application
      compatibility, staffing, or change-freeze constraints and you need a short
      extension window. The decisive factor is whether delaying migration is
      worth paying an unpublished surcharge while remaining on best-effort
      support."
    tradeoffs: "Least immediate engineering work, but you stay on unsupported
      versions with unclear future cost and no path back to automated in-place
      upgrades until you migrate."
    cautions: "This is not a stable steady-state choice. As of 2026-03-27, the
      legacy fee has not started yet, but the decision window is open now
      because the affected versions are already EOL and unsupported under the
      SLA."
    links:
      - "https://upcloud.com/docs/products/managed-kubernetes/supported-version\
        s/"
      - "https://upcloud.com/docs/products/managed-kubernetes/billing/"
      - "https://upcloud.com/pricing/"

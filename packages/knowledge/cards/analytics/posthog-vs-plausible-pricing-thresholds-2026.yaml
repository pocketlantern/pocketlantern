id: "analytics/posthog-vs-plausible-pricing-thresholds-2026"
title: "PostHog vs Plausible Pricing Thresholds for Event/Product vs
  Privacy-First Website Analytics in 2026"
problem: "Choose between event-based product analytics pricing and
  pageview-based privacy-first website analytics pricing using current 2026
  free-tier thresholds, retention limits, and add-on or plan costs that
  materially change total cost at scale."
context:
  - "product-analytics"
  - "web-analytics"
  - "saas"
constraints:
  - "cost-sensitive"
  - "small-team"
  - "high-scale"
candidates:
  - name: "PostHog Cloud"
    summary: "PostHog uses usage-based pricing centered on events. As of 2026-03-18,
      Product Analytics includes a free tier of 1 million events per month, then
      starts at $0.00005 per event and gets cheaper at higher volumes. The free
      cloud plan includes 1 project and 1-year data retention; adding a card for
      usage-based billing expands that to 6 projects and 7-year data retention
      while keeping the monthly free volume. Session Replay is a separate meter
      with 5,000 free recordings per month and paid usage starting at $0.005 per
      recording."
    when_to_use: "Use PostHog when you need product analytics with event-level
      instrumentation, user or cohort analysis, and retention beyond simple site
      traffic reporting. It fits best when you expect high custom-event volume,
      need authenticated or user-level analysis, or want flexible in-app funnels
      and breakdowns. It is most cost-effective when your event volume stays
      inside the free threshold or scales cleanly under event-based billing and
      replay usage is limited."
    tradeoffs: "Strong free allowance and volume discounts favor teams with heavy
      product instrumentation. Costs become more complex because multiple meters
      exist, and replay or adjacent products can outgrow the base analytics line
      item."
    cautions: "As of 2026-03-18, retention differs sharply by billing state: 1 year
      on the free cloud plan versus 7 years once you add a card for usage-based
      billing. Do not model cost from analytics events alone if you also want
      session replay or other separately metered products."
    links:
      - "https://posthog.com/pricing"
      - "https://posthog.com/"
  - name: "Plausible Analytics Cloud"
    summary: "Plausible uses subscription pricing based on total monthly pageviews
      and custom events across all sites in the account. As of 2026-03-18, it
      does not advertise a permanent free tier; it offers a 30-day free trial,
      with Starter at $9 per month for up to 10k monthly pageviews, Growth at
      $14 per month, and Business at $19 per month for the same traffic tier
      with more features. Starter includes 3 years of data retention, while
      Business includes 5 years. Funnels, custom properties, the Stats API, and
      the Looker Studio connector are Business-plan features."
    when_to_use: "Use Plausible when your primary need is privacy-first website
      analytics and your traffic is mostly pageview-driven rather than
      product-event-heavy. It is the better fit for marketing sites, docs,
      blogs, and content properties where predictable subscription pricing
      matters more than user-level or authenticated-product analysis. Choose it
      when custom events are light to moderate, long-term product retention
      analysis is not required, and anonymous aggregate reporting is
      sufficient."
    tradeoffs: "Pricing is easier to forecast because usage is tied to pageview
      tiers instead of multiple product meters. The tradeoff is a narrower model
      built around anonymous website measurement rather than deep user-level
      product analytics."
    cautions: "As of 2026-03-18, custom events count toward the same subscription
      usage pool as pageviews, so event-heavy setups can still push you into
      higher traffic tiers. Its no-cookie, no-personal-data,
      no-persistent-identifier model is useful for privacy-sensitive sites but
      limits user-centric product analysis."
    links:
      - "https://plausible.io/"
      - "https://plausible.io/docs/trial-to-paid"

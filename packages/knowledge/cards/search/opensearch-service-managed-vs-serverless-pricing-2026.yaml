id: "search/opensearch-service-managed-vs-serverless-pricing-2026"
title: "Amazon OpenSearch Service Managed Clusters vs Serverless Pricing in
  March 2026"
problem: "Decide whether to keep a domain-based OpenSearch deployment or move to
  Serverless now that OCU minimums, storage pricing, and unpredictable search
  traffic change the break-even point."
context:
  - "aws"
  - "search"
  - "opensearch"
constraints:
  - "cost-sensitive"
  - "serverless"
  - "real-time"
candidates:
  - name: "Keep a provisioned Amazon OpenSearch Service domain"
    summary: "Amazon OpenSearch Service domains are provisioned clusters billed by
      instance-hour plus attached EBS storage, with optional managed-storage
      charges for UltraWarm, cold, and OR1 remote store. As of 2026-03-27, AWS
      documents support for OpenSearch versions 3.1, 2.19, 2.17, 2.15, 2.13,
      2.11, 2.9, 2.7, 2.5, 2.3, 1.3, 1.2, 1.1, and 1.0. AWS also applies
      extended-support charges automatically when a domain runs a version past
      standard support; in us-east-1 the documented extended-support rate is
      $0.0065 per Normalized Instance Hour on top of normal instance cost. This
      model keeps topology, storage tiers, snapshots, VPC integration, and
      version choice under your control, which matters if you already run a
      tuned steady-state cluster."
    when_to_use: "Use this when traffic is steady enough that fixed capacity is
      predictable, or when you need cluster-level controls, explicit
      engine-version choice, snapshots, warm or cold tiers, or VPC-centric
      operations. The decisive factor is whether your current domain is already
      well-sized and avoids extended-support fees; if so, Serverless does not
      automatically beat it on cost."
    tradeoffs: "Pros: predictable topology, broad feature surface, storage-tier
      options, version control, and no serverless OCU floor. Cons: you pay for
      idle capacity, must size and tune nodes, and old engine versions can pick
      up automatic extended-support charges."
    cautions: "As of 2026-03-27, extended support is already a pricing factor for
      older engine lines: OpenSearch 1.0 through 1.2 and 2.3 through 2.9 left
      standard support on November 7, 2025. Multi-AZ with Standby has no
      separate surcharge, but AWS pricing examples show some domains still need
      extra cluster-manager capacity or more data copies to meet best practices,
      which can raise total cost."
    links:
      - "https://aws.amazon.com/opensearch-service/pricing/"
      - "https://docs.aws.amazon.com/opensearch-service/latest/developerguide/w\
        hat-is.html"
  - name: "Move to Amazon OpenSearch Serverless"
    summary: "Amazon OpenSearch Serverless is an auto-scaling deployment model where
      AWS manages capacity, software updates, and OpenSearch version upgrades.
      As of 2026-03-27, AWS pricing examples show Search and Indexing OCUs at
      $0.24 per OCU-hour in us-east-1 and managed storage at $0.02 per GB-month
      for the example collection. AWS cut the minimum entry point in June 2024:
      production deployments can start at 2 OCUs with 0.5 OCU components, and
      dev or test can start at 1 OCU. On those documented us-east-1 example
      rates, that implies a production floor of about $350.40 per 730-hour month
      before storage, which materially changed the old 4-OCU break-even."
    when_to_use: "Use this when search traffic is intermittent or unpredictable, or
      when the main goal is reducing ops work and avoiding cluster right-sizing.
      The decisive factor is whether your workload spends enough time below a
      continuously provisioned cluster's capacity that the lower 2-OCU
      production floor plus usage-based scaling offsets the always-on serverless
      baseline."
    tradeoffs: "Pros: no cluster management, automatic scaling, non-disruptive
      service-managed upgrades, and lower entry cost than the original 4-OCU
      production minimum. Cons: there is still an always-on OCU floor for
      production, storage is billed separately, and you give up explicit
      engine-version control."
    cautions: "Serverless collections are always encrypted, and encryption cannot be
      disabled. As of February 10, 2026, Collection Groups let multiple
      collections with different KMS keys share OCUs and define minimum and
      maximum OCU limits, which can improve multi-tenant cost efficiency; if you
      evaluated Serverless before that date, your cost model may now be stale."
    links:
      - "https://aws.amazon.com/opensearch-service/pricing/"
      - "https://docs.aws.amazon.com/opensearch-service/latest/developerguide/s\
        erverless.html"
      - "https://aws.amazon.com/about-aws/whats-new/2024/06/amazon-opensearch-s\
        erverless-entry-cost-half-collection-types/"
      - "https://aws.amazon.com/about-aws/whats-new/2026/02/amazon-opensearch-s\
        erverless-supports-collection-groups/"

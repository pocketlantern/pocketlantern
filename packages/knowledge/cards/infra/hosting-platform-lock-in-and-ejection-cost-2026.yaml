      from: vendor/netlify
      to: capability/auth
      surface: Netlify Identity (GoTrue-based) — no bulk user export UI, passwords
        require re-auth on migration
      severity: medium
    - type: locks_via
      from: vendor/netlify
      to: capability/blob-storage
      surface: Netlify Blobs — no S3 API, SDK-only export via @netlify/blobs or

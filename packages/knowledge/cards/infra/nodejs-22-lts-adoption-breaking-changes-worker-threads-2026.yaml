id: "infra/nodejs-22-lts-adoption-breaking-changes-worker-threads-2026"
title: "Node.js 22 LTS Adoption: Breaking Changes, Worker Thread Module Hooks,
  Support Timeline 2026"
problem: "Node.js 20 (Iron) reaches end-of-life April 30, 2026. Teams must
  migrate to Node.js 22 (Maintenance LTS, EOL April 2027) or Node.js 24 (Active
  LTS, EOL April 2028). Node.js 22 removes import assertion syntax, enables
  require(ESM) by default, changes worker thread module hook behavior, and
  raises the stream high-water mark default. Skipping to Node.js 24 adds OpenSSL
  3.5 security-level-2 enforcement and stricter fetch/stream behavior. Migration
  path and EOL runway differ significantly between the two targets."
context:
  - "nodejs"
  - "javascript"
  - "backend"
  - "runtime"
  - "lts"

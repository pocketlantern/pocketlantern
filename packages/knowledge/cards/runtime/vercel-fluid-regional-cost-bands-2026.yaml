id: "runtime/vercel-fluid-regional-cost-bands-2026"
title: "Vercel Fluid Compute Region Selection at $0.128 to $0.221 CPU-Hour in 2026"
problem: "Decide whether latency gains justify deploying Fluid Compute in
  higher-cost regions like Sao Paulo or Tokyo instead of lower-cost U.S. regions
  in 2026."
context:
  - "vercel"
  - "serverless"
  - "nextjs"
  - "edge-and-functions"
constraints:
  - "cost-sensitive"
  - "serverless"
  - "high-scale"
  - "low-ops"
candidates:
  - name: "Deploy Fluid Compute in lower-cost U.S. regions"
    summary: 'As of 2026-03-19, Vercel lists Washington, D.C. (iad1), Cleveland
      (cle1), and Portland (pdx1) at "$0.128" per Active CPU hour and
      "$0.0106" per GB-hour of provisioned memory, which is the documented
      low-cost Fluid pricing band.'
    when_to_use: "Use this when you are cost-sensitive and do not yet have measured
      evidence that a user-local deployment changes conversion, interaction
      quality, or timeout risk. It is the default choice when most traffic can
      tolerate extra network distance and you want the lowest documented Fluid
      CPU and memory rates in Vercel's regional table."
    tradeoffs: "Lowest verified compute rates, simplest default, and easier to
      justify financially. The tradeoff is that users far from U.S. regions may
      see worse latency than they would from a nearer deployment."
    cautions: "Do not compare only CPU-hour numbers. Memory is also region-priced,
      and long-lived I/O-heavy requests can keep memory billing active even when
      CPU billing pauses."
    links:
      - "https://vercel.com/docs/functions/usage-and-pricing/"
      - "https://vercel.com/docs/pricing/serverless-functions"
      - "https://vercel.com/docs/pricing/regional-pricing/"
      - "https://vercel.com/changelog/lower-pricing-with-active-cpu-pricing-for\
        -fluid-compute"
  - name: "Deploy Fluid Compute in higher-cost user-local regions such as Tokyo or
      Sao Paulo"
    summary: 'As of 2026-03-19, Vercel lists Tokyo (hnd1) at "$0.202" per Active
      CPU hour and "$0.0167" per GB-hour, and Sao Paulo (gru1) at "$0.221"
      and "$0.0183". This is the higher regional pricing band versus the
      "$0.128" and "$0.0106" U.S. baseline, so choose it only when lower
      latency in those regions is worth the added spend.'
    when_to_use: "Use this only when your traffic is concentrated near Japan or
      Brazil and you have measured that lower latency changes a meaningful
      business or product outcome, or when geographic placement itself is a hard
      requirement. It is the right choice when proximity is the decisive factor
      and the higher regional rate is acceptable."
    tradeoffs: "Potentially better user-perceived latency for local audiences and
      better regional fit for workloads serving those geographies. The downside
      is clearly higher per-unit CPU and memory pricing than the lowest-cost
      U.S. regions."
    cautions: "The official pricing pages verify the cost premium, not the size of
      any latency improvement for your app. Validate with your own traffic and
      request profile before paying the higher regional band."
    links:
      - "https://vercel.com/docs/functions/usage-and-pricing/"
      - "https://vercel.com/docs/pricing/serverless-functions"
      - "https://vercel.com/docs/pricing/regional-pricing/hnd1"
      - "https://vercel.com/docs/pricing/regional-pricing/"
